name: Caretaker

on:
  schedule:
    - cron: "0 8 * * 1"
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  # Triggered when ANY workflow run completes — used by devops + self-heal agents
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  # Triggered by Dependabot alerts — used by security agent
  dependabot_alert:
    types: [created]
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "full"
        type: choice
        options:
          [
            full,
            pr-only,
            issue-only,
            upgrade-only,
            devops,
            self-heal,
            security,
            deps,
            docs,
            stale,
            escalation,
            dry-run,
          ]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install caretaker
        run: |
          pip install caretaker

      - name: Run
        id: caretaker_run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          caretaker run \
            --config .github/maintainer/config.yml \
            --mode "${{ github.event.inputs.mode || (github.event_name == 'workflow_run' && 'event') || 'full' }}" \
            --event-type "${{ github.event_name }}" \
            --event-payload '${{ toJSON(github.event) }}'

  # When the caretaker run itself fails, trigger the self-heal agent
  self-heal-on-failure:
    runs-on: ubuntu-latest
    needs: maintain
    if: failure()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install caretaker
        run: pip install caretaker

      - name: Self-heal — analyse own failure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Pass info about the failed run so the agent can fetch its logs
          CARETAKER_FAILED_RUN_ID: ${{ github.run_id }}
        run: |
          caretaker run \
            --config .github/maintainer/config.yml \
            --mode self-heal \
            --event-type workflow_run \
            --event-payload '{
              "workflow_run": {
                "id": ${{ github.run_id }},
                "name": "Caretaker",
                "conclusion": "failure",
                "head_branch": "${{ github.ref_name }}"
              }
            }'
