name: Caretaker

on:
  schedule:
    - cron: "0 8 * * *"
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  # Triggered when ANY workflow run completes — used by devops + self-heal agents
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - pr-only
          - issue-only
          - upgrade
          - devops
          - self-heal
          - security
          - deps
          - docs
          - stale
          - escalation
          - dry-run

# Prevent duplicate runs for the same PR / branch.  Concurrent check_suite,
# pull_request, and workflow_run events for the same head can fire within
# seconds of each other; without this guard every run posts its own @copilot
# comment.
concurrency:
  group: caretaker-${{ github.event.pull_request.number || github.event.issue.number || github.event.check_suite.head_branch || github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Restore memory store cache
        uses: actions/cache@v4
        with:
          path: .caretaker-memory.db
          key: caretaker-memory-${{ github.repository }}
          restore-keys: |
            caretaker-memory-

      - name: Install caretaker
        run: |
          VERSION=$(cat .github/maintainer/.version)
          pip install "caretaker-github @ git+https://github.com/ianlintner/caretaker.git@v${VERSION}"

      - name: Run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT for a real write-capable user or machine user.
          # Caretaker uses this for Copilot issue assignment and @copilot comments
          # that must not be authored as github-actions[bot].
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CARETAKER_EVENT_PAYLOAD: ${{ toJSON(github.event) }}
          CARETAKER_LOG_FILE: caretaker-run.log
          CARETAKER_REPORT_FILE: caretaker-report.json
        run: |
          caretaker run \
            --config .github/maintainer/config.yml \
            --mode "${{ github.event.inputs.mode || (github.event_name == 'workflow_run' && 'event') || 'full' }}" \
            --event-type "${{ github.event_name }}" \
            --event-payload "$CARETAKER_EVENT_PAYLOAD"

      # Upload a JSON snapshot of the memory store so it can be downloaded for
      # auditing or used to manually restore a known-good state.
      - name: Upload memory store snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: caretaker-memory-snapshot-${{ github.run_number }}
          path: .caretaker-memory-snapshot.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: caretaker-run-log-${{ github.run_id }}
          path: caretaker-run.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: caretaker-run-report-${{ github.run_id }}
          path: caretaker-report.json
          if-no-files-found: ignore
          retention-days: 30

  # When the caretaker run itself fails, trigger the self-heal agent
  self-heal-on-failure:
    runs-on: ubuntu-latest
    needs: maintain
    if: failure()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install caretaker
        run: |
          VERSION=$(cat .github/maintainer/.version)
          pip install "caretaker-github @ git+https://github.com/ianlintner/caretaker.git@v${VERSION}"

      - name: Self-heal — analyse own failure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT for a real write-capable user or machine user.
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CARETAKER_FAILED_RUN_ID: ${{ github.run_id }}
          CARETAKER_FLEET_SECRET: ${{ secrets.CARETAKER_FLEET_SECRET }}
          CARETAKER_LOG_FILE: caretaker-self-heal.log
          CARETAKER_REPORT_FILE: caretaker-self-heal-report.json
          CARETAKER_EVENT_PAYLOAD: >-
            {
              "workflow_run": {
                "id": ${{ github.run_id }},
                "name": "Caretaker",
                "conclusion": "failure",
                "head_branch": "${{ github.ref_name }}"
              }
            }
        run: |
          caretaker run \
            --config .github/maintainer/config.yml \
            --mode self-heal \
            --event-type workflow_run \
            --event-payload "$CARETAKER_EVENT_PAYLOAD"

      - name: Upload self-heal log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: caretaker-self-heal-log-${{ github.run_id }}
          path: caretaker-self-heal.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload self-heal report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: caretaker-self-heal-report-${{ github.run_id }}
          path: caretaker-self-heal-report.json
          if-no-files-found: ignore
          retention-days: 30
