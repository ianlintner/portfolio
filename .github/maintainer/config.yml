# .github/maintainer/config.yml
# Portfolio & Blog — caretaker configuration
version: v1

orchestrator:
  schedule: weekly
  summary_issue: true
  dry_run: false

pr_agent:
  enabled: true
  auto_merge:
    copilot_prs: true
    dependabot_prs: true
    human_prs: false
    merge_method: squash
  copilot:
    max_retries: 2
    retry_window_hours: 24
    context_injection: true
  ci:
    flaky_retries: 1
    ignore_jobs: []
    close_managed_prs_on_backlog: true
  review:
    auto_approve_copilot: false
    nitpick_threshold: low

issue_agent:
  enabled: true
  auto_assign_bugs: false
  auto_assign_features: false
  auto_close_stale_days: 30
  auto_close_questions: true
  labels:
    bug: ["bug"]
    feature: ["enhancement", "feature"]
    question: ["question"]

upgrade_agent:
  enabled: true
  strategy: auto-minor

devops_agent:
  enabled: false
  target_branch: main
  max_issues_per_run: 3
  dedup_open_issues: true

self_heal_agent:
  enabled: true
  report_upstream: true

security_agent:
  enabled: true
  min_severity: medium
  max_issues_per_run: 5
  false_positive_rules: []
  include_dependabot: true
  include_code_scanning: true
  include_secret_scanning: true

dependency_agent:
  enabled: true
  auto_merge_patch: true
  auto_merge_minor: true
  merge_method: squash
  post_digest: true

docs_agent:
  enabled: true
  lookback_days: 7
  changelog_path: CHANGELOG.md
  update_readme: false

charlie_agent:
  enabled: true
  stale_days: 14
  close_duplicate_issues: true
  close_duplicate_prs: true
  close_stale_issues: true
  close_stale_prs: true
  exempt_labels:
    - pinned
    - maintainer:escalated
    - maintainer:escalation-digest

stale_agent:
  enabled: true
  stale_days: 60
  close_after: 14
  close_stale_prs: true
  delete_merged_branches: true
  exempt_labels:
    - pinned
    - security
    - security:finding
    - dependencies:major-upgrade
    - caretaker:self-heal
    - devops:build-failure

human_escalation:
  enabled: true
  post_digest_issue: true
  notify_assignees: []

escalation:
  targets: []
  stale_days: 7
  labels: ["maintainer:escalated"]

# ── Fleet Registry ────────────────────────────────────────────────────────────
# Register this repo with the caretaker admin dashboard. When enabled, the
# orchestrator POSTs a heartbeat to the central registry after every run so
# the fleet page at https://caretaker.cat-herding.net shows live status.
#
# Authentication: OAuth2 client_credentials (v0.20.0+). To opt in:
#   1. Provision a per-repo OAuth2 client (see docs/fleet-opt-in-runbook.md).
#   2. Set OAUTH2_CLIENT_ID + OAUTH2_CLIENT_SECRET as repo secrets and
#      OAUTH2_TOKEN_URL + OAUTH2_SCOPE as repo variables.
#   3. Flip fleet_registry.enabled: true below.
fleet_registry:
  enabled: false
  endpoint: https://caretaker.cat-herding.net/api/fleet/heartbeat
  timeout_seconds: 5.0
  include_full_summary: false
  # OAuth2 client_credentials — the only auth mode supported by v0.20.0+.
  # Set OAUTH2_CLIENT_ID + OAUTH2_CLIENT_SECRET as repo secrets and
  # OAUTH2_TOKEN_URL + OAUTH2_SCOPE as repo variables, then flip
  # enabled: true to register with the admin dashboard.
  oauth2:
    enabled: true
    client_id_env: OAUTH2_CLIENT_ID
    client_secret_env: OAUTH2_CLIENT_SECRET
    token_url_env: OAUTH2_TOKEN_URL
    scope_env: OAUTH2_SCOPE
    default_scope: "fleet:heartbeat"
    timeout_seconds: 10.0

llm:
  claude_enabled: auto
  provider: litellm
  default_model: azure_ai/gpt-4o
  claude_features:
    - ci_log_analysis
    - architectural_review
    - issue_decomposition
