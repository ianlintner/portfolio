<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0f172a"/>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="630" fill="url(#overlay)"/>

  <circle cx="230" cy="210" r="30" fill="#0ea5e9" filter="url(#glow)"/>
  <circle cx="360" cy="140" r="24" fill="#8b5cf6" filter="url(#glow)"/>
  <circle cx="430" cy="250" r="22" fill="#10b981" filter="url(#glow)"/>
  <circle cx="540" cy="170" r="20" fill="#f97316" filter="url(#glow)"/>
  <circle cx="600" cy="280" r="22" fill="#ef4444" filter="url(#glow)"/>
  <circle cx="700" cy="210" r="24" fill="#3b82f6" filter="url(#glow)"/>

  <line x1="230" y1="210" x2="360" y2="140" stroke="#94a3b8" stroke-width="3" opacity="0.8"/>
  <line x1="360" y1="140" x2="430" y2="250" stroke="#94a3b8" stroke-width="3" opacity="0.8"/>
  <line x1="430" y1="250" x2="540" y2="170" stroke="#94a3b8" stroke-width="3" opacity="0.8"/>
  <line x1="540" y1="170" x2="600" y2="280" stroke="#94a3b8" stroke-width="3" opacity="0.8"/>
  <line x1="600" y1="280" x2="700" y2="210" stroke="#94a3b8" stroke-width="3" opacity="0.8"/>

  <rect x="770" y="110" width="330" height="210" rx="16" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <text x="800" y="155" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#e2e8f0">Orchestrator</text>
  <text x="800" y="195" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8">Decides priorities</text>
  <text x="800" y="230" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8">Delegates to agents</text>
  <text x="800" y="265" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8">Keeps repo healthy</text>

  <text x="80" y="475" font-family="Arial, sans-serif" font-size="62" font-weight="bold" fill="white">Caretaker</text>
  <text x="80" y="540" font-family="Arial, sans-serif" font-size="38" fill="#94a3b8">Self-Managing Agentic Repo Maintenance</text>
  <text x="965" y="585" font-family="Arial, sans-serif" font-size="24" fill="#64748b">by Ian Lintner</text>
</svg>
