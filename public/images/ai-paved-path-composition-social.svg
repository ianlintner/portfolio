    <text x="256" y="224" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white">Policies</text>
    <text x="392" y="224" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white">Evals</text>
    <rect x="112" y="250" width="168" height="18" rx="9" fill="#1e293b" />
    <rect x="112" y="250" width="118" height="18" rx="9" fill="#22c55e" />
    <rect x="298" y="250" width="180" height="18" rx="9" fill="#1e293b" />
    <rect x="298" y="250" width="138" height="18" rx="9" fill="#f97316" />
  </g>

  <g filter="url(#shadow)">
    <rect x="565" y="120" width="555" height="220" rx="30" fill="#111827" stroke="#334155" stroke-width="2" />
    <rect x="612" y="168" width="24" height="120" rx="12" fill="#0ea5e9" />
    <rect x="700" y="168" width="24" height="120" rx="12" fill="#8b5cf6" />
    <rect x="788" y="168" width="24" height="120" rx="12" fill="#22c55e" />
    <path d="M636 228H700" stroke="url(#lane)" stroke-width="10" stroke-linecap="round" />
    <path d="M724 228H788" stroke="url(#lane)" stroke-width="10" stroke-linecap="round" />
    <path d="M812 228H876" stroke="url(#lane)" stroke-width="10" stroke-linecap="round" />
    <circle cx="888" cy="228" r="28" fill="#0f172a" stroke="#38bdf8" stroke-width="8" />
    <text x="930" y="205" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">Shippable</text>
    <text x="930" y="243" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">Observable</text>
    <text x="930" y="281" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">Governed</text>
    <text x="612" y="318" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8">Delivery lanes that turn agent output into repeatable systems</text>
