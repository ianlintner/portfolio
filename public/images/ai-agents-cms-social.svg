<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0f172a"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.15" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="630" fill="url(#overlay)"/>

  <!-- Old CMS UI mockup (faded, crossed out) -->
  <rect x="60" y="60" width="320" height="220" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2" opacity="0.6"/>
  <rect x="72" y="80" width="296" height="24" rx="4" fill="#334155" opacity="0.5"/>
  <rect x="72" y="116" width="200" height="16" rx="3" fill="#475569" opacity="0.4"/>
  <rect x="72" y="144" width="296" height="80" rx="4" fill="#334155" opacity="0.4"/>
  <rect x="72" y="236" width="100" height="28" rx="4" fill="#475569" opacity="0.4"/>
  <!-- X through old CMS -->
  <line x1="60" y1="60" x2="380" y2="280" stroke="#ef4444" stroke-width="4" opacity="0.7"/>
  <line x1="380" y1="60" x2="60" y2="280" stroke="#ef4444" stroke-width="4" opacity="0.7"/>

  <!-- AI Agent (central, glowing) -->
  <circle cx="680" cy="160" r="55" fill="#0ea5e9" opacity="0.15" filter="url(#softGlow)"/>
  <circle cx="680" cy="160" r="40" fill="#0ea5e9" opacity="0.9" filter="url(#glow)"/>
  <text x="680" y="170" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold">AI</text>

  <!-- Connected output targets -->
  <!-- Static site -->
  <rect x="500" y="40" width="80" height="50" rx="6" fill="#10b981" opacity="0.8"/>
  <text x="540" y="72" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Static</text>

  <!-- MDX file -->
  <rect x="840" y="40" width="80" height="50" rx="6" fill="#8b5cf6" opacity="0.8"/>
  <text x="880" y="72" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">MDX</text>

  <!-- SaaS CMS -->
  <rect x="840" y="220" width="80" height="50" rx="6" fill="#f97316" opacity="0.8"/>
  <text x="880" y="252" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">SaaS</text>

  <!-- MCP -->
  <rect x="500" y="220" width="80" height="50" rx="6" fill="#3b82f6" opacity="0.8"/>
  <text x="540" y="252" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">MCP</text>

  <!-- GitHub -->
  <rect x="960" y="120" width="80" height="50" rx="6" fill="#6366f1" opacity="0.8"/>
  <text x="1000" y="152" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">GitHub</text>

  <!-- Connection lines from AI hub -->
  <line x1="645" y1="135" x2="580" y2="85" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="715" y1="135" x2="840" y2="72" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="715" y1="185" x2="840" y2="238" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="645" y1="185" x2="580" y2="238" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="720" y1="158" x2="960" y2="148" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Arrow from old CMS to AI agent -->
  <line x1="400" y1="170" x2="620" y2="162" stroke="#0ea5e9" stroke-width="3" stroke-dasharray="8,4" opacity="0.6"/>
  <polygon points="620,155 636,162 620,169" fill="#0ea5e9" opacity="0.6"/>

  <!-- Title text -->
  <text x="80" y="420" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white">AI Agents Are the Last CMS</text>
  <text x="80" y="490" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white">You'll Ever Need</text>
  <text x="80" y="550" font-family="Arial, sans-serif" font-size="32" fill="#94a3b8">Bring Your Agents, Ditch the Dashboard</text>

  <text x="1020" y="590" font-family="Arial, sans-serif" font-size="24" fill="#64748b">by Ian Lintner</text>
</svg>
